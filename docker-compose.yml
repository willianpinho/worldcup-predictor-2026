services:
  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # SQLite file lives on the named volume (mounted at /app/data), not in the image.
      DATABASE_URL: "file:./data/data.db"
      FOOTBALL_API_KEY: "${FOOTBALL_API_KEY:-}"
      FOOTBALL_LEAGUE_ID: "${FOOTBALL_LEAGUE_ID:-1}"
      FOOTBALL_SEASON: "${FOOTBALL_SEASON:-2026}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:?set ADMIN_TOKEN}"
      CRON_SECRET: "${CRON_SECRET:?set CRON_SECRET}"
    volumes:
      - wc_db:/app/data
    networks:
      # Ingress (Traefik) + a private network shared only with the cron sidecar.
      - traefik-network
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.worldcup.rule=Host(`worldcup2026.willianpinho.com`)
      - traefik.http.routers.worldcup.entrypoints=websecure
      # Cloudflare-proxied prod: TLS terminated with the CF origin cert in Traefik.
      # tls=true ONLY — no certresolver (per rules/vps-infra.md).
      - traefik.http.routers.worldcup.tls=true
      - traefik.http.services.worldcup.loadbalancer.server.port=3000
      - traefik.docker.network=traefik-network

  # Polls the results-sync endpoint every 10 min so scores update automatically
  # during match windows. Syncs once on start (no blind window after a restart),
  # then loops. Logs each run's timestamp + the JSON SyncReport so failures are
  # observable in `docker compose logs cron` (the previous `-s ... || true` form
  # was silent and hid the broken-provider failure for the tournament opener).
  #
  # IMPORTANT: the cron lives ONLY on the private `internal` network, not on the
  # shared `traefik-network`. On the shared network the alias `app` collides with
  # other projects' `app` services (their compose also aliases `app`), so docker
  # DNS round-robined `http://app:3000` across containers and ~60% of syncs hit a
  # foreign app and got a 404. The private network makes `app` resolve uniquely
  # to this project's app container.
  cron:
    image: curlimages/curl:8.11.1
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: "${CRON_SECRET:?set CRON_SECRET}"
    networks:
      - internal
    entrypoint:
      - sh
      - -c
      - |
        while true; do
          echo "[cron $$(date -u +%FT%TZ)] sync ->"
          curl -fsS -m 60 -X POST http://app:3000/api/results/sync \
            -H "x-cron-secret: $$CRON_SECRET" || echo "[cron] sync request failed"
          echo
          sleep 600
        done

volumes:
  wc_db:

networks:
  # External Traefik network on the VPS (test-ash).
  traefik-network:
    external: true
  # Private bridge for app<->cron only, so the `app` alias is unambiguous and
  # cannot collide with other projects' `app` services on the shared network.
  internal:
    driver: bridge
