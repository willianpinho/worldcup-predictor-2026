services:
  app:
    build: .
    image: bolao-copa-2026
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # SQLite file lives on the named volume (mounted at /app/data), not in the image.
      DATABASE_URL: "file:./data/data.db"
      FOOTBALL_API_KEY: "${FOOTBALL_API_KEY:-}"
      FOOTBALL_LEAGUE_ID: "${FOOTBALL_LEAGUE_ID:-1}"
      FOOTBALL_SEASON: "${FOOTBALL_SEASON:-2026}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:?set ADMIN_TOKEN}"
      CRON_SECRET: "${CRON_SECRET:?set CRON_SECRET}"
    volumes:
      - bolao_db:/app/data
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.bolao.rule=Host(`bolao.willianpinho.com`)
      - traefik.http.routers.bolao.entrypoints=websecure
      # Cloudflare-proxied prod: TLS terminated with the CF origin cert in Traefik.
      # tls=true ONLY — no certresolver (per rules/vps-infra.md).
      - traefik.http.routers.bolao.tls=true
      - traefik.http.services.bolao.loadbalancer.server.port=3000
      - traefik.docker.network=web

  # Polls the results-sync endpoint every 30 min so scores update automatically.
  cron:
    image: curlimages/curl:8.11.1
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: "${CRON_SECRET:?set CRON_SECRET}"
    networks:
      - web
    entrypoint:
      - sh
      - -c
      - 'while true; do sleep 1800; curl -s -X POST http://app:3000/api/results/sync -H "x-cron-secret: $$CRON_SECRET" || true; done'

volumes:
  bolao_db:

networks:
  # External Traefik network. Rename to match your VPS (e.g. `traefik`, `proxy`).
  web:
    external: true
